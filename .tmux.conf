# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard
# set-option -g default-command "reattach-to-user-namespace -l bash"

# act like vim
set-option -g status-keys vi
setw -g mode-keys vi
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# look good
set -g default-terminal "screen-256color"

# time machine
set -g history-limit 999999

# small screens won't hold me back
setw -g aggressive-resize on
setw -g monitor-activity on

unbind C-b
set -g prefix C-a
bind ^A send-prefix

# use current WD for new windows
bind c new-window -c "#{pane_current_path}"

# use vim bindings to move through panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

unbind r
bind r last-window
unbind ^T
bind ^T split-window -p 25
unbind a
bind a select-pane -t :.+
unbind Right
bind Right resize-pane -R 8
unbind Left
bind Left resize-pane -L 8
unbind Up
bind Up resize-pane -U 4
unbind Down
bind Down resize-pane -D 4

set-option -g status on

# nvim optimized
set-option -sg escape-time 10
set-option -g focus-events on

# tmux-powerline
run-shell "/Users/jenner/Library/Python/3.9/bin/powerline-daemon -q"
source "/Users/jenner/Library/Python/3.9/lib/python/site-packages/powerline/bindings/tmux/powerline.conf"

# change session status color
set -qg status-left '#{?client_prefix,#[fg=colour254]#[bg=colour31]#[bold],#[fg=colour252]#[bg=colour237]#[bold]} #S #I:#P #{?client_prefix,#[fg=colour31]#[bg=colour234]#[nobold],#[fg=colour237]#[bg=colour234]#[nobold]}#(eval $POWERLINE_COMMAND tmux left) '
set-option -g status-right-length 1000
