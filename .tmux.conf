# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard
# set-option -g default-command "reattach-to-user-namespace -l bash"

# act like vim
set-option -g status-keys vi
setw -g mode-keys vi
set -g mouse on
#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# look good
set -g default-terminal "tmux-256color"

## add to tmux-256color.terminfo and install with tic
# # A tmux-256color based TERMINFO that adds the escape sequences for italic.
# tmux-256color|screen with 256 colors and italic,
#  sitm=\E[3m, ritm=\E[23m,
#  use=screen-256color,

# time machine
set -g history-limit 999999

# small screens won't hold me back
setw -g aggressive-resize on
setw -g monitor-activity on

unbind C-b
set -g prefix C-a
bind ^A send-prefix

# use current WD for new windows
bind c new-window -c "#{pane_current_path}"

# use vim bindings to move through panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

unbind r
bind r last-window

# When the attached session is killed, hop to another session instead of detaching to the shell
set -g detach-on-destroy off

# Dynamic session tooling (see ~/.dotfiles/bin/tmux-*)
bind J display-popup -E -w 60% -h 60% "~/.dotfiles/bin/tmux-sessionizer"   # fuzzy jump/create session
bind g switch-client -l                                                    # last session
bind -r ( switch-client -p                                                 # prev session (repeatable)
bind -r ) switch-client -n                                                 # next session (repeatable)
bind S choose-tree -Zs                                                     # visual session/window browser
bind M display-popup -E -w 50% -h 50% "~/.dotfiles/bin/tmux-move-window"   # move window to another/new session
bind P display-popup -E -w 60% -h 60% "~/.dotfiles/bin/tmux-merge-windows" # merge windows into panes
bind R run-shell "~/.dotfiles/bin/tmux-refactor-session"                   # split session by directory
bind X confirm-before -p "kill session '#S'? (y/n)" kill-session           # kill session, hop to next
unbind ^T
bind ^T split-window -p 25
unbind a
bind a select-pane -t :.+
unbind Right
bind Right resize-pane -R 8
unbind Left
bind Left resize-pane -L 8
unbind Up
bind Up resize-pane -U 4
unbind Down
bind Down resize-pane -D 4

# nvim optimized
set-option -sg escape-time 10
set-option -g focus-events on

# pass through extended keys (Shift+Enter, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set-option -g status-style bg=black,fg=cyan
# Subtle activity hint: a thin underline instead of a filled highlight (no color shift)
set -g window-status-activity-style bright
# Window list emphasis lives in the *base* styles (not the powerline #() format string), so
# tmux applies it deterministically on every redraw — putting bold inside the cached #() output
# made it flicker. Inactive windows are muted gray; only the active window is accent blue + bold.
set -g window-status-style "fg=colour244"
set -g window-status-current-style "fg=colour74,bold"

# Live, session-aware window titles (dir shown only when it differs from the session's most common dir)
run-shell -b "~/.dotfiles/bin/tmux-claude-titles-loop.sh"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'erikw/tmux-powerline'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
