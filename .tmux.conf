# https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard
set-option -g default-command "reattach-to-user-namespace -l bash"

# act like vim
set-option -g status-keys vi
setw -g mode-keys vi
setw -g mode-mouse on

# look good
set -g default-terminal "screen-256color"

# time machine
set -g history-limit 999999

# small screens won't hold me back
setw -g aggressive-resize on
setw -g monitor-activity on

# use C-a as prefix (like GNU screen)
unbind C-b
set -g prefix C-a
bind a send-prefix

# use current WD for new windows
bind c new-window -c "#{pane_current_path}"

# use vim bindings to move through panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

unbind r
bind r last-window
unbind ^T
bind ^T split-window -p 25
unbind ^A
bind ^A select-pane -t :.+
unbind Right
bind Right resize-pane -R 8
unbind Left
bind Left resize-pane -L 8
unbind Up
bind Up resize-pane -U 4
unbind Down
bind Down resize-pane -D 4

set-option -g status on
set-option -g status-utf8 on

# tmux-powerline
source "/usr/local/lib/python2.7/site-packages/powerline/bindings/tmux/powerline.conf"

# change session status color
set -qg status-left '#{?client_prefix,#[fg=colour254]#[bg=colour31]#[bold],#[fg=colour252]#[bg=colour237]#[bold]} #S #I:#P #{?client_prefix,#[fg=colour31]#[bg=colour234]#[nobold],#[fg=colour237]#[bg=colour234]#[nobold]}#(eval $POWERLINE_COMMAND tmux left)'
set-option -g status-right-length 1000
