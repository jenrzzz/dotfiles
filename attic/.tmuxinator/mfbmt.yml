# ~/.tmuxinator/mfbmt.yml

name: mfbmt
root: ~/Source/apple/mfbmt

windows:
  - boo: tmux link-window -ks "this:0" -t boo
  - baz: tmux link-window -ks "this:1" -t baz
  - srv:
      layout: main-horizontal
      panes:
        - shell:
          - bin/ssh
        - sherlock:
          - cd ~/Source/apple/sherlock
          - npm run dev
        - mfbmt:
          - sleep 5
          - bin/dev
  - sherlock:
      root: ~/Source/apple/sherlock
      panes:
        - 'true'
  - mfbmt: 'true'
